server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy tRPC and REST API to apiserver (also handles the Envoy-less case)
    location /trpc {
        proxy_pass http://apiserver:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api {
        proxy_pass http://apiserver:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback: any path that doesn't match a real file serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed static assets (JS/CSS bundles from Vite)
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No caching for index.html so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
