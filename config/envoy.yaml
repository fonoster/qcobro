# Envoy TLS configuration for QCobro.
#
# Terminates HTTPS on port 443 and routes to the apiserver (tRPC + REST)
# and webapp (React SPA) containers on the internal Docker network.
#
# Replace "app.qcobro.com" with your actual domain before deploying.
static_resources:
  listeners:
    - name: listener_https
      address:
        socket_address: { address: 0.0.0.0, port_value: 443 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: auto
                stat_prefix: ingress_qcobro
                route_config:
                  name: qcobro_route
                  virtual_hosts:
                    - name: qcobro
                      domains: ["*"]
                      routes:
                        # tRPC and REST API → apiserver
                        - match: { prefix: "/trpc" }
                          route: { cluster: apiserver, timeout: 30s }
                        - match: { prefix: "/api" }
                          route: { cluster: apiserver, timeout: 30s }
                        # Everything else → webapp (React SPA via nginx)
                        - match: { prefix: "/" }
                          route: { cluster: webapp, timeout: 10s }
                      cors:
                        allow_origin_string_match:
                          - prefix: "*"
                        allow_methods: GET, PUT, DELETE, POST, OPTIONS
                        allow_headers: authorization,content-type,x-workspace,cache-control
                        max_age: "86400"
                http_filters:
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                  - certificate_chain:
                      filename: "/etc/letsencrypt/live/app.qcobro.com/fullchain.pem"
                    private_key:
                      filename: "/etc/letsencrypt/live/app.qcobro.com/privkey.pem"

  clusters:
    - name: apiserver
      type: logical_dns
      connect_timeout: 20s
      lb_policy: round_robin
      load_assignment:
        cluster_name: apiserver
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: apiserver, port_value: 3000 }

    - name: webapp
      type: logical_dns
      connect_timeout: 20s
      lb_policy: round_robin
      load_assignment:
        cluster_name: webapp
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: webapp, port_value: 80 }
