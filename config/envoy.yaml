# Envoy TLS configuration for QCobro.
#
# Terminates HTTPS on port 443 and routes to the apiserver (tRPC + REST)
# and webapp (React SPA) containers on the internal Docker network.
#
# Replace "app.qcobro.com" with your actual domain before deploying.
static_resources:
  listeners:
    - name: listener_https
      address:
        socket_address: { address: 0.0.0.0, port_value: 443 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: auto
                stat_prefix: ingress_qcobro
                route_config:
                  name: qcobro_route
                  virtual_hosts:
                    - name: qcobro
                      domains: ["*"]
                      routes:
                        # Native gRPC (Fonoster Voice Server → the embedded
                        # VoiceServer for PRE-RECORDED agents). Fonoster dials
                        # back into us over HTTP/2 when a pre-recorded call
                        # connects. Matched by content-type so it wins over the
                        # SPA catch-all regardless of the gRPC method path, and
                        # routed to the HTTP/2 apiserver_voice cluster. timeout 0
                        # so a streaming call is never cut short by Envoy.
                        - match:
                            prefix: "/"
                            headers:
                              - name: "content-type"
                                string_match: { prefix: "application/grpc" }
                          route: { cluster: apiserver_voice, timeout: 0s }
                        # tRPC and REST API → apiserver
                        - match: { prefix: "/trpc" }
                          route: { cluster: apiserver, timeout: 30s }
                        - match: { prefix: "/api" }
                          route: { cluster: apiserver, timeout: 30s }
                        # Everything else → webapp (React SPA via nginx)
                        - match: { prefix: "/" }
                          route: { cluster: webapp, timeout: 10s }
                      cors:
                        allow_origin_string_match:
                          - prefix: "*"
                        allow_methods: GET, PUT, DELETE, POST, OPTIONS
                        allow_headers: authorization,content-type,x-workspace,cache-control
                        max_age: "86400"
                http_filters:
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                # Offer h2 in ALPN so native gRPC clients (Fonoster's Voice
                # Server) negotiate HTTP/2 on this same 443 listener, while
                # browsers/REST fall back to HTTP/1.1.
                alpn_protocols: ["h2", "http/1.1"]
                tls_certificates:
                  # Certs are copied (dereferenced) into ./config/certs by the
                  # certbot renewal deploy-hook, because Docker userns-remap means
                  # the container cannot read Let's Encrypt's 0600/0700 tree directly.
                  - certificate_chain:
                      filename: "/etc/envoy/certs/fullchain.pem"
                    private_key:
                      filename: "/etc/envoy/certs/privkey.pem"

  clusters:
    - name: apiserver
      type: logical_dns
      connect_timeout: 20s
      lb_policy: round_robin
      load_assignment:
        cluster_name: apiserver
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: apiserver, port_value: 3000 }

    # Embedded Fonoster VoiceServer for pre-recorded agents. gRPC upstream, so
    # http2_protocol_options is required. Port must match apiserver.voicePort in
    # qcobro.json (50061). Reachable over the internal Docker network — no need
    # to publish the port on the host.
    - name: apiserver_voice
      type: logical_dns
      connect_timeout: 20s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      lb_policy: round_robin
      load_assignment:
        cluster_name: apiserver_voice
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: apiserver, port_value: 50061 }

    - name: webapp
      type: logical_dns
      connect_timeout: 20s
      lb_policy: round_robin
      load_assignment:
        cluster_name: webapp
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: webapp, port_value: 80 }
