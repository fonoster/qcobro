services:
  # openssl genrsa creates private keys with 600 permissions; the identity
  # container runs as a non-root user and can't read them. This one-shot
  # service ensures 644 on both key files before identity starts.
  init-identity-keys:
    image: alpine:3
    restart: "no"
    volumes:
      - ./config/identity/keys:/keys
    command: ["chmod", "644", "/keys/private.pem", "/keys/public.pem"]

  # Fonoster Identity — configured entirely by a mounted file (no env vars).
  # QCobro reaches it at identity:50051 on the internal Docker network.
  identity:
    image: fonoster/identity:0.22.0
    restart: unless-stopped
    depends_on:
      init-identity-keys:
        condition: service_completed_successfully
    volumes:
      - ./config/identity:/service/config:ro

  # Image versions are pinned via QCOBRO_VERSION (set it in a .env file next to
  # this compose.yaml, e.g. `QCOBRO_VERSION=v1.0.0`). To deploy/upgrade, change
  # that one value and run `docker compose pull && docker compose up -d` — never
  # re-tag images locally.
  apiserver:
    image: ghcr.io/fonoster/qcobro-apiserver:${QCOBRO_VERSION}
    restart: unless-stopped
    volumes:
      - ./config/qcobro.json:/config/qcobro.json:ro

  webapp:
    image: ghcr.io/fonoster/qcobro-webapp:${QCOBRO_VERSION}
    restart: unless-stopped

  envoy:
    image: envoyproxy/envoy:v1.35.0
    restart: unless-stopped
    volumes:
      - ./config/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "443:443"
    depends_on:
      - apiserver
      - webapp
