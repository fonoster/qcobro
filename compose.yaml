services:
  # Fonoster Identity — configured entirely by a mounted file (no env vars).
  # QCobro reaches it at identity:50051 on the internal Docker network.
  identity:
    image: fonoster/identity:0.22.0
    restart: unless-stopped
    volumes:
      - ./config/identity:/service/config:ro
      # Override Identity's stock (Fonoster-branded) email/SMS templates with the
      # QCobro-branded ones. v0.22.0 has no config option for a custom template
      # dir on the verification path, so we bind-mount each .hbs over the baked-in
      # file at /service/mods/identity/dist/templates. These are version-pinned
      # brand assets (refreshed on every deploy), not install-once secrets.
      - ./config/identity/templates/verifyEmail.hbs:/service/mods/identity/dist/templates/verifyEmail.hbs:ro
      - ./config/identity/templates/verifyPhone.hbs:/service/mods/identity/dist/templates/verifyPhone.hbs:ro
      - ./config/identity/templates/inviteNewUser.hbs:/service/mods/identity/dist/templates/inviteNewUser.hbs:ro
      - ./config/identity/templates/inviteExistingUser.hbs:/service/mods/identity/dist/templates/inviteExistingUser.hbs:ro
      - ./config/identity/templates/resetPassword.hbs:/service/mods/identity/dist/templates/resetPassword.hbs:ro

  # Image versions are pinned via QCOBRO_VERSION (set it in a .env file next to
  # this compose.yaml, e.g. `QCOBRO_VERSION=v1.0.0`). To deploy/upgrade, change
  # that one value and run `docker compose pull && docker compose up -d` — never
  # re-tag images locally.
  apiserver:
    image: ghcr.io/fonoster/qcobro-apiserver:${QCOBRO_VERSION}
    restart: unless-stopped
    environment:
      # @fonoster/logger reads this directly (no qcobro.json plumbing for a
      # third-party lib's env var). Set to "info" to quiet the migrated
      # console.log-turned-verbose lines.
      LOGS_LEVEL: verbose
    volumes:
      - ./config/qcobro.json:/config/qcobro.json:ro

  webapp:
    image: ghcr.io/fonoster/qcobro-webapp:${QCOBRO_VERSION}
    restart: unless-stopped

  envoy:
    image: envoyproxy/envoy:v1.35.0
    restart: unless-stopped
    # Certs live in ./config/certs (populated from Let's Encrypt by the certbot
    # renewal deploy-hook). We don't mount /etc/letsencrypt directly because Docker
    # userns-remap maps the container's root to an unprivileged host UID that can't
    # read certbot's 0600 key or traverse its 0700 live/archive dirs.
    volumes:
      - ./config/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./config/certs:/etc/envoy/certs:ro
    ports:
      - "443:443"
    depends_on:
      - apiserver
      - webapp
