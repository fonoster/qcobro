services:
  api:
    build:
      context: .
      dockerfile: mods/apiserver/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: /data/qcobro.db
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - db_data:/data
    restart: unless-stopped

volumes:
  db_data:
