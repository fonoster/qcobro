services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: qcobro
      POSTGRES_PASSWORD: qcobro
      POSTGRES_DB: qcobro
    ports:
      - "5432:5432"
    volumes:
      - qcobro-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qcobro -d qcobro"]
      interval: 3s
      timeout: 3s
      retries: 20

  # Fonoster Identity, run from the published image and configured entirely by a
  # mounted file (no environment variables). It provisions its own database on
  # start. QCobro reaches it as a client at identity:50051 (or localhost:50051
  # when the apiserver runs on the host).
  identity:
    image: fonoster/identity:0.20.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config/identity:/service/config:ro
      # Patches a bug in the published image: createSendSmsTwilioImpl crashes when
      # Twilio is not configured. Fix is committed in the fonoster repo; mount the
      # compiled output until a new image is published.
      - /Users/psanders/Projects/fonoster/mods/common/dist/notifications/createSendSmsTwilioImpl.js:/service/mods/common/dist/notifications/createSendSmsTwilioImpl.js:ro
    ports:
      - "50051:50051"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  qcobro-db:
