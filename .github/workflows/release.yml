name: Release

# Conventional-commits autobump. Runs only after CI passes on main, so a
# broken build can never produce a release. Lerna inspects commits since the
# last vX.Y.Z tag and, if any are releasable (feat → minor, fix → patch,
# BREAKING CHANGE → major), bumps lerna.json + all mods/* packages, writes
# CHANGELOG, commits "chore(release): publish vX.Y.Z", and pushes the commit
# and tag. The vX.Y.Z tag then triggers docker-publish.yml.
#
# Required secret: RELEASE_TOKEN
#   A personal access token (classic or fine-grained) with:
#     contents: write   — push the bump commit + tag
#     read:packages     — so the deploy workflow can pass it to the droplet
#   The default GITHUB_TOKEN cannot be used here: tags pushed by it do NOT
#   trigger downstream workflows (docker-publish would never fire).

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      force_bump:
        description: "Force a release with no mods/* changes: patch|minor|major (empty = normal conventional-commits autobump)"
        required: false
        default: ""

# Never run two releases at once; don't cancel an in-flight one mid-push.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest (avoid EBEHIND if commits land during runner startup)
        run: git pull --rebase origin main

      - name: Record pre-version HEAD
        id: pre
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # --no-push: lerna's own push (git push --follow-tags) pushes the branch commit
      # and the new tag as separate ref updates, not atomically. If main advances after
      # our checkout (e.g. another push lands mid-run) the branch push is rejected as
      # non-fast-forward, but the tag ref has no such conflict and can still land on the
      # remote — publishing a tag whose commit was never actually merged to main. That's
      # exactly how v1.14.0 got published from an orphaned commit on 2026-07-12. Pushing
      # ourselves, branch first, lets a rejected branch push abort before any tag exists
      # on the remote at all.
      - name: Version and tag (local only)
        run: |
          if [ -n "${{ inputs.force_bump }}" ]; then
            # Force a release even when no mods/* package changed. Deploy/CI/TLS
            # changes live outside the lerna packages, so the conventional-commits
            # autobump finds "No changed packages to version" and never releases
            # them. --force-publish bumps every package to the requested level.
            npx lerna version "${{ inputs.force_bump }}" --yes --force-publish --no-push
          else
            npx lerna version --conventional-commits --yes --no-push
          fi

      - name: Push commit, then tag
        run: |
          if [ "$(git rev-parse HEAD)" = "${{ steps.pre.outputs.sha }}" ]; then
            echo "No release created (no changed packages) — nothing to push."
            exit 0
          fi
          new_tag=$(git describe --tags --exact-match HEAD)
          git push origin HEAD:main
          git push origin "$new_tag"
