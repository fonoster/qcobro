name: CI

on:
  push:
    branches: [main]
    paths:
      - "mods/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # The Prisma wrapper (scripts/prisma.mjs) and the apiserver build read
      # database.url from qcobro.json, which is gitignored and absent in CI.
      # Write a minimal config — no DB connection is made during
      # generate/typecheck/build, so a placeholder URL is sufficient.
      - name: Write CI qcobro.json
        run: echo '{"database":{"url":"postgresql://user:pass@localhost:5432/db?schema=public"}}' > qcobro.json

      - name: Build common (provides types for downstream packages)
        run: npm run build --workspace=mods/common

      # Generate the Prisma client so apiserver's types resolve during typecheck.
      - name: Generate Prisma client
        run: npm run db:generate --workspace=mods/apiserver

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
