name: CI

on:
  push:
    branches: [main]
    paths:
      - "mods/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # The Prisma wrapper (scripts/prisma.mjs) and the apiserver build read
      # database.url from qcobro.json, which is gitignored and absent in CI.
      # Write a minimal config — no DB connection is made during
      # generate/typecheck/build, so a placeholder URL is sufficient.
      - name: Write CI qcobro.json
        run: echo '{"database":{"url":"postgresql://user:pass@localhost:5432/db?schema=public"}}' > qcobro.json

      # Generate the Prisma client before building. The webapp resolves
      # apiserver's types from source (which reference Prisma model types), so
      # the client must exist before any project builds — not left to the
      # apiserver build step, which Nx may run in parallel with the webapp.
      - name: Generate Prisma client
        run: npm run db:generate --workspace=mods/apiserver

      # Build everything: produces each project's declaration outputs, which the
      # cross-project typecheck requires (e.g. mods/sdk references apiserver).
      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
