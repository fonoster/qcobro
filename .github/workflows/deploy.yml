name: Deploy

# Deploys a published qcobro image pair to the DigitalOcean droplet.
#
# Triggers automatically after "Publish Docker Images" succeeds (workflow_run),
# or manually via "Run workflow" for rollbacks or forced re-deploys.
#
# Flow:
#   1. resolve — determine the version from the triggering tag or manual input.
#   2. deploy  — pauses for a human approval in the "production" environment,
#                then SSHes in, pins QCOBRO_VERSION, pulls and restarts.
#                Rolls back automatically if containers don't come up.
#
# Required repo configuration:
#   secrets.RELEASE_TOKEN     PAT with contents:read + packages:read
#   secrets.DEPLOY_SSH_HOST   droplet IP or hostname
#   secrets.DEPLOY_SSH_USER   SSH user
#   secrets.DEPLOY_SSH_KEY    SSH private key (PEM, no passphrase)
#   vars.DEPLOY_COMPOSE_DIR   directory on the droplet with compose.yaml + .env
#
# Environment: add psanders (or the relevant team) as a required reviewer on
# the "production" environment in Settings → Environments so the deploy job
# pauses for approval before touching the server.

on:
  workflow_run:
    workflows: ["Publish Docker Images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to deploy (e.g. v1.2.0; empty = current lerna.json version)"
        required: false

# One deploy at a time; queue rather than cancel so a started deploy finishes.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  resolve:
    # Skip entirely when the upstream publish run failed or was cancelled.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ inputs.version }}"
            [ -n "$v" ] || v="v$(node -p "require('./lerna.json').version")"
          else
            # docker-publish runs on vX.Y.Z tags; head_branch carries the tag name.
            v="${{ github.event.workflow_run.head_branch }}"
          fi
          [[ "$v" == v* ]] || v="v$v"
          if ! echo "$v" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Could not resolve a semver version from '$v'" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Deploying **$v**" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: resolve
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          COMPOSE_DIR: ${{ vars.DEPLOY_COMPOSE_DIR }}
          GHCR_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GHCR_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: VERSION,COMPOSE_DIR,GHCR_TOKEN,GHCR_OWNER
          script: |
            set -e
            cd "$COMPOSE_DIR"

            # Refresh the version-pinned config + deploy scripts straight from
            # GitHub. The Droplet is not a git checkout (see README — install only
            # copies files), so we curl exactly the files the stack needs, pinned
            # to the deployed tag.
            #
            # ONLY these four files are overwritten. Never add the local config or
            # secrets here — config/qcobro.json, config/identity/identity.json, and
            # config/identity/keys/* are written once at install and must survive
            # every deploy untouched. .env is preserved too: only its
            # QCOBRO_VERSION line is rewritten below (TLS_DOMAIN/TLS_EMAIL stay).
            BASE="https://raw.githubusercontent.com/${GHCR_OWNER}/qcobro/${VERSION}"
            mkdir -p config scripts/deploy
            curl -fsSL "$BASE/compose.yaml"                          -o compose.yaml
            curl -fsSL "$BASE/config/envoy.yaml"                     -o config/envoy.yaml
            curl -fsSL "$BASE/scripts/deploy/tls.sh"                 -o scripts/deploy/tls.sh
            curl -fsSL "$BASE/scripts/deploy/refresh-envoy-certs.sh" -o scripts/deploy/refresh-envoy-certs.sh
            chmod +x scripts/deploy/tls.sh scripts/deploy/refresh-envoy-certs.sh

            # Authenticate to GHCR so we can pull the new images.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_OWNER" --password-stdin

            # Pin QCOBRO_VERSION in .env, remembering the previous value for rollback.
            touch .env
            prev=$(grep '^QCOBRO_VERSION=' .env | cut -d= -f2- || true)
            grep -v '^QCOBRO_VERSION=' .env > .env.next || true
            echo "QCOBRO_VERSION=${VERSION}" >> .env.next
            mv .env.next .env

            docker compose pull apiserver webapp
            docker compose up -d

            # Wait up to 60 s for all services to be running.
            ok=""
            for i in $(seq 1 30); do
              stopped=$(docker compose ps --status exited --quiet 2>/dev/null | wc -l)
              starting=$(docker compose ps --status starting --quiet 2>/dev/null | wc -l)
              if [ "$stopped" = "0" ] && [ "$starting" = "0" ]; then
                ok=1
                break
              fi
              sleep 2
            done

            if [ -z "$ok" ]; then
              echo "Deploy of ${VERSION} failed — containers did not come up cleanly." >&2
              docker compose ps
              docker compose logs --tail 50
              if [ -n "$prev" ]; then
                echo "Rolling back to ${prev}." >&2
                grep -v '^QCOBRO_VERSION=' .env > .env.next || true
                echo "QCOBRO_VERSION=${prev}" >> .env.next
                mv .env.next .env
                docker compose pull apiserver webapp
                docker compose up -d
              fi
              exit 1
            fi

            # Issue the TLS cert on first deploy and renew it when inside the
            # expiry window. Rate-limit-safe and non-fatal: a cert hiccup must
            # not fail an otherwise-good app deploy.
            if [ -x scripts/deploy/tls.sh ]; then
              scripts/deploy/tls.sh || echo "WARNING: TLS sync failed — check certs/Envoy."
            fi

            echo "Deployed ${VERSION} successfully."
            docker compose ps
