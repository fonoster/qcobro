name: e2e

on:
  push:
    branches: [main]
    paths:
      - "mods/**"
      - "e2e/**"
      - "package.json"
      - "package-lock.json"
      - "compose.dev.yaml"
      - "playwright.config.ts"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main]

jobs:
  e2e:
    # Skip lerna's own bump commits — they only change version numbers and would
    # otherwise re-run e2e for nothing (mirrors the guard in test.yml).
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # qcobro.json and the Identity service config are gitignored (they hold
      # deployment secrets), so generate CI-local copies. Values point at the
      # services compose.dev.yaml publishes on localhost; the Identity container
      # reaches Postgres/Mailpit by service name on the compose network.
      - name: Generate config and Identity keys
        run: |
          mkdir -p config/identity/keys
          openssl genrsa -out config/identity/keys/private.pem 2048
          openssl rsa -in config/identity/keys/private.pem -pubout \
            -out config/identity/keys/public.pem

          cat > config/identity/identity.json <<'JSON'
          {
            "server": { "bindAddr": "0.0.0.0:50051", "httpBridgePort": 9110 },
            "database": { "url": "postgresql://qcobro:qcobro@db:5432/identity?schema=public" },
            "encryptionKey": "k1.aesgcm256.cWpIPDjly8s0Y1UIKPhV2LDs-mJDkxpHQjOWnLiXK_E",
            "issuer": "qcobro",
            "audience": "qcobro",
            "keys": {
              "privateKeyPath": "/service/config/keys/private.pem",
              "publicKeyPath": "/service/config/keys/public.pem"
            },
            "appUrl": "http://localhost:5173",
            "invite": {
              "url": "http://localhost:5173/accept-invite",
              "failUrl": "http://localhost:5173/invite-failed"
            },
            "smtp": {
              "host": "mailpit", "port": 1025, "secure": false,
              "sender": "QCobro <no-reply@qcobro.local>"
            }
          }
          JSON

          cat > config/qcobro.json <<'JSON'
          {
            "database": { "url": "postgresql://qcobro:qcobro@localhost:5432/qcobro?schema=public" },
            "identity": { "endpoint": "localhost:50051", "httpBridgeUrl": "http://localhost:9110" },
            "ai": { "enabled": true, "provider": "mock", "model": "mock" }
          }
          JSON

      # Backing services (db + identity + mailpit) from the dev compose file.
      # db-init creates the `identity` database; Identity migrates its own schema
      # on startup. The apiserver and webapp run on the host (below).
      - name: Start backing services
        run: docker compose -f compose.dev.yaml up -d --wait

      - name: Build and provision the apiserver database
        run: |
          npm run build --workspace=mods/common
          npm run db:generate --workspace=mods/apiserver
          npm run db:migrate:deploy --workspace=mods/apiserver

      - name: Wait for Identity
        run: |
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/localhost/50051) 2>/dev/null; then
              echo "identity ready"; exit 0
            fi
            sleep 2
          done
          echo "identity failed to start"
          docker compose -f compose.dev.yaml logs identity
          exit 1

      - name: Start apiserver and webapp
        run: |
          npm run start:dev > /tmp/apiserver.log 2>&1 &
          npm run start:webapp > /tmp/webapp.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf localhost:3000/health >/dev/null \
               && curl -sf localhost:5173 >/dev/null; then
              echo "stack ready"; exit 0
            fi
            sleep 2
          done
          echo "stack failed to start"; tail -n 50 /tmp/apiserver.log /tmp/webapp.log; exit 1

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e
        run: npm run test:e2e

      - name: Upload report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
