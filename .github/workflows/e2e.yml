name: e2e

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Backing services (db + identity + mailpit) via the same compose file
      # used for local development. The apiserver and webapp run on the host
      # below. Config (qcobro.json, config/identity) is committed and points at
      # localhost, which matches the ports compose.dev.yaml publishes.
      - name: Start backing services
        run: |
          docker compose -f compose.dev.yaml up -d --wait db
          # The single postgres only auto-creates the qcobro database; the
          # identity service expects a separate `identity` database.
          docker compose -f compose.dev.yaml exec -T db \
            psql -U qcobro -d qcobro -tc \
            "SELECT 1 FROM pg_database WHERE datname='identity'" | grep -q 1 \
            || docker compose -f compose.dev.yaml exec -T db createdb -U qcobro identity
          docker compose -f compose.dev.yaml up -d identity mailpit

      - name: Build common and provision apiserver database
        run: |
          npm run build --workspace=mods/common
          npm run db:generate --workspace=mods/apiserver
          npm run db:migrate:deploy --workspace=mods/apiserver

      - name: Wait for identity
        run: |
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/localhost/50051) 2>/dev/null; then
              echo "identity ready"; exit 0
            fi
            sleep 2
          done
          echo "identity failed to start"
          docker compose -f compose.dev.yaml logs identity
          exit 1

      - name: Start services (apiserver, webapp)
        run: |
          npm run start:dev > /tmp/apiserver.log 2>&1 &
          npm run start:webapp > /tmp/webapp.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf localhost:3000/health >/dev/null \
               && curl -sf localhost:5173 >/dev/null; then
              echo "stack ready"; exit 0
            fi
            sleep 2
          done
          echo "stack failed to start"; tail -n 50 /tmp/apiserver.log /tmp/webapp.log; exit 1

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e
        run: npm run test:e2e

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
